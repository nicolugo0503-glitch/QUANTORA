<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Markets Board | Quantora</title>
<meta name="description" content="A live board of major stocks and crypto - price and daily move, refreshed on demand. Free, no login.">
<link rel="canonical" href="https://www.usequantora.com/live.html">
<link rel="stylesheet" href="/theme.css">
<style>
body{background:#f7f8fa;color:#14161c;font-family:Geist,system-ui,sans-serif;margin:0}
.sw{max-width:820px;margin:0 auto;padding:34px 24px 90px}
.eyb{text-transform:uppercase;letter-spacing:.16em;font-size:11px;color:#9aa1ad;font-weight:500}
.hh{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
h1{font-size:clamp(26px,3.4vw,36px);font-weight:600;letter-spacing:-.03em;margin:8px 0 6px}
.lv{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:#0f9d63;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;background:#0f9d63;animation:pl 1.6s infinite}@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.rf{border:1px solid rgba(17,24,39,.14);background:#fff;border-radius:9px;padding:8px 14px;font:500 13px Geist;cursor:pointer;color:#14161c}
.tbl{margin-top:18px;background:#fff;border:1px solid rgba(17,24,39,.1);border-radius:14px;overflow:hidden}
.r{display:grid;grid-template-columns:90px 1fr 120px 110px;gap:10px;align-items:center;padding:13px 16px;border-bottom:1px solid rgba(17,24,39,.06);text-decoration:none;color:inherit}
.r:last-child{border-bottom:0}.r:hover{background:#fafbfc}
.r.hd{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#9aa1ad;font-weight:500}
.sym{font-family:Geist Mono,monospace;font-weight:600;color:#635bff}
.nm{color:#3a4150;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.px{font-family:Geist Mono,monospace;text-align:right;font-variant-numeric:tabular-nums}
.ch{font-family:Geist Mono,monospace;text-align:right;font-variant-numeric:tabular-nums;font-weight:500}
.up{color:#0f9d63}.down{color:#d6453d}.muted{color:#c2c7d0}
.foot{margin-top:30px;padding-top:18px;border-top:1px solid rgba(17,24,39,.08);font-size:11.5px;color:#9aa1ad;line-height:1.6}
</style><script src="/nav.js" defer></script></head>
<body><div id="qnav"></div><div class="sw">
<div class="eyb">Quantora &middot; Markets</div>
<div class="hh"><div><h1>Live Markets Board</h1><span class="lv"><span class="dot"></span><span id="ago">loading...</span></span></div><button class="rf" id="rf">Refresh</button></div>
<div class="tbl" id="tbl"><div class="r hd"><div>Symbol</div><div>Name</div><div class="px">Price</div><div class="ch">Change</div></div></div>
<div class="foot">Quotes via Financial Modeling Prep; may be delayed and depend on the data plan's daily limit. Not investment advice.</div>
</div>
<script>
var BASKET=[['SPY','S&P 500 ETF'],['AAPL','Apple'],['MSFT','Microsoft'],['NVDA','NVIDIA'],['AMZN','Amazon'],['META','Meta'],['GOOGL','Alphabet'],['TSLA','Tesla'],['JPM','JPMorgan'],['BTCUSD','Bitcoin'],['ETHUSD','Ethereum']];
var tbl=document.getElementById('tbl'),rf=document.getElementById('rf'),ago=document.getElementById('ago');
function esc(s){return String(s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'})[c];});}
function num(v,d){d=d==null?2:d;return (v==null||isNaN(v))?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
async function fmp(type,extra){try{var r=await fetch('/api/fmp?type='+type+(extra||''));var j=await r.json();return j.data;}catch(e){return null;}}
function rowHTML(sym,nm,q){
  var price=q?q.price:null,chg=q?(q.changePercentage!=null?q.changePercentage:q.changesPercentage):null;
  var dir=chg==null?'muted':(chg>=0?'up':'down');
  var href=/USD$/.test(sym)?'#':'/stock/'+sym;
  return '<a class="r" href="'+href+'"><div class="sym">'+esc(sym)+'</div><div class="nm">'+esc(nm)+'</div><div class="px">'+(price!=null?'$'+num(price):'—')+'</div><div class="ch '+dir+'">'+(chg!=null?(chg>=0?'+':'')+num(chg)+'%':'—')+'</div></a>';
}
async function load(){
  rf.disabled=true;ago.textContent='updating...';
  var html='<div class="r hd"><div>Symbol</div><div>Name</div><div class="px">Price</div><div class="ch">Change</div></div>';
  tbl.innerHTML=html;
  for(var i=0;i<BASKET.length;i++){var b=BASKET[i];var q=await fmp('quote','&symbol='+b[0]);q=Array.isArray(q)?q[0]:q;tbl.insertAdjacentHTML('beforeend',rowHTML(b[0],b[1],q));}
  ago.textContent='updated '+new Date().toLocaleTimeString();rf.disabled=false;
}
rf.addEventListener('click',load);
load();
</script>
</body></html>
