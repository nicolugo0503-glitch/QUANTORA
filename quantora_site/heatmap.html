<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Market Movers Heatmap | Quantora</title>
<meta name="description" content="A live heatmap of the day's biggest market movers - gainers and most active - colored by move. Free, no login.">
<link rel="canonical" href="https://www.usequantora.com/heatmap.html">
<link rel="stylesheet" href="/theme.css">
<style>
body{background:#f7f8fa;color:#14161c;font-family:Geist,system-ui,sans-serif;margin:0}
.sw{max-width:980px;margin:0 auto;padding:34px 24px 90px}
.eyb{text-transform:uppercase;letter-spacing:.16em;font-size:11px;color:#9aa1ad;font-weight:500}
h1{font-size:clamp(26px,3.4vw,36px);font-weight:600;letter-spacing:-.03em;margin:8px 0 14px}
.sec2{margin:26px 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#9aa1ad;font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.tile{border-radius:11px;padding:13px 14px;text-decoration:none;color:#14161c;border:1px solid rgba(17,24,39,.06);min-height:62px;display:flex;flex-direction:column;justify-content:space-between}
.tile .s{font-family:Geist Mono,monospace;font-weight:600;font-size:14px}
.tile .p{font-family:Geist Mono,monospace;font-size:15px;font-weight:600}
.state{background:#fffaf0;border:1px solid #f0d9a8;color:#7a5a14;border-radius:12px;padding:14px 16px;font-size:14px;line-height:1.6}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(99,91,255,.25);border-top-color:#635bff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:8px}@keyframes sp{to{transform:rotate(360deg)}}
.foot{margin-top:36px;padding-top:18px;border-top:1px solid rgba(17,24,39,.08);font-size:11.5px;color:#9aa1ad;line-height:1.6}
</style><script src="/nav.js" defer></script></head>
<body><div id="qnav"></div><div class="sw">
<div class="eyb">Quantora &middot; Markets</div>
<h1>Market Movers Heatmap</h1>
<div id="out"><div class="state"><span class="spin"></span>Loading live movers...</div></div>
<div class="foot">Live movers via Financial Modeling Prep; depends on the data plan's daily limit. Tiles are colored by today's % move. Not investment advice.</div>
</div>
<script>
function esc(s){return String(s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'})[c];});}
function num(v,d){d=d==null?2:d;return (v==null||isNaN(v))?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
async function fmp(type){try{var r=await fetch('/api/fmp?type='+type);var j=await r.json();return j.data;}catch(e){return null;}}
function tile(it){
  var sym=it.symbol||it.ticker||'';var chg=it.changesPercentage!=null?it.changesPercentage:(it.changePercentage!=null?it.changePercentage:0);
  if(typeof chg==='string')chg=parseFloat(chg.replace(/[()%]/g,''));
  var up=chg>=0;var a=Math.min(0.10+Math.abs(chg)*0.05,0.6);
  var bg=up?'rgba(15,157,99,'+a+')':'rgba(214,69,61,'+a+')';
  var col=up?'#0a6e45':'#9a3329';
  var price=it.price!=null?it.price:null;
  return '<a class="tile" style="background:'+bg+'" href="/stock/'+esc(sym)+'"><div class="s">'+esc(sym)+'</div><div class="p" style="color:'+col+'">'+(chg>=0?'+':'')+num(chg,1)+'%</div>'+(price!=null?'<div style="font-family:Geist Mono,monospace;font-size:11px;color:#5b6270">$'+num(price)+'</div>':'')+'</a>';
}
function grid(list){return '<div class="grid">'+list.slice(0,30).map(tile).join('')+'</div>';}
async function load(){
  var out=document.getElementById('out');
  var g=await fmp('gainers');var a=await fmp('actives');
  var html='';
  if(g&&g.length)html+='<div class="sec2">Top gainers</div>'+grid(g);
  if(a&&a.length)html+='<div class="sec2">Most active</div>'+grid(a);
  out.innerHTML=html||'<div class="state">Live movers aren\'t available right now - the free data feed may be at its daily limit. Try the <a href="/live.html">markets board</a> or come back later.</div>';
}
load();
</script>
</body></html>
